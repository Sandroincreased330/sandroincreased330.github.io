name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AA95C3: ${{ secrets.AA95C3 }}
          BB5FFB: ${{ secrets.BB5FFB }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AA95C3', '')
          bm = os.environ.get('BB5FFB', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 30a7c7e1d48665f52246520074c059cb96a4dc384e24791d -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 90d91bef39b68a57b703a0d751fd8ca9 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
